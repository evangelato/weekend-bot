name: Post Weekend GIF

on:
  schedule:
    - cron: "0 1 * * 6"  # Every Friday at 5PM PST (1AM UTC Saturday)

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python post_gif.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
