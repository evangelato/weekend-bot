name: Post Weekend GIF

on:
  schedule:
    - cron: "0 0 * * 6"  # Fridays midnight UTC (5PM PDT, summer)
    - cron: "0 1 * * 6"  # Fridays 1AM UTC (5PM PST, winter)

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python post_gif.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
